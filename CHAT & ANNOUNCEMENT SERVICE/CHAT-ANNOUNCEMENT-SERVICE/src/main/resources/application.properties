# 1. Server & Application Name
server.port=8082
spring.application.name=CHAT-ANNOUNCEMENT-SERVICE

# 2. PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/chat_&_announcement
spring.datasource.username=postgres
spring.datasource.password=aman
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 4. Eureka Client Registration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/